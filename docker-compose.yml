networks:
  certitrack-network:
    driver: bridge

services:
  frontend:
    build:
      context: ./public
      dockerfile: Dockerfile
    container_name: certitrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - certitrack-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: certitrack-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - certitrack-network
